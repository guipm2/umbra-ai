name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

  frontend-lint-changed:
    name: Frontend Lint (Changed Files)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Detect changed frontend files
        id: changed
        uses: tj-actions/changed-files@v46
        with:
          files: |
            frontend/src/**/*.ts
            frontend/src/**/*.tsx
            frontend/src/**/*.js
            frontend/src/**/*.jsx

      - name: Lint changed files
        if: steps.changed.outputs.any_changed == 'true'
        run: npx eslint ${{ steps.changed.outputs.all_changed_files }}

      - name: No frontend changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No frontend source file changed."